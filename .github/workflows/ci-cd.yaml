name: CI/CD to Kubernetes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/simple-app
  K8S_NAMESPACE: default

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code with full history
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Fetch all history to get latest changes
        ref: ${{ github.head_ref || github.ref_name }}  # Check out the correct branch
    
    - name: Pull latest changes (for PRs)
      if: github.event_name == 'pull_request'
      run: |
        git pull origin ${{ github.head_ref }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./app
        push: true
        tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}, ${{ env.DOCKER_IMAGE }}:latest
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
  
    
    - name: Get current image from deployment.yaml
      id: current_image
      run: |
        CURRENT_IMAGE=$(grep "image:" k8s/deployment.yaml | head -1 | awk '{print $2}')
        echo "Current image: $CURRENT_IMAGE"
        echo "current_image=$CURRENT_IMAGE" >> $GITHUB_OUTPUT
    
    - name: Update deployment image
      run: |
        NEW_IMAGE="${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
        echo "Updating from ${{ steps.current_image.outputs.current_image }} to $NEW_IMAGE"
        sed -i "s|image:.*|image: $NEW_IMAGE|g" k8s/deployment.yaml
    
    - name: Check if image changed
      id: image_changed
      run: |
        if [ "${{ steps.current_image.outputs.current_image }}" != "${{ env.DOCKER_IMAGE }}:${{ github.sha }}" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Image needs update"
        else
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "Image already up to date"
        fi
    
    - name: Commit and push updated deployment.yaml
      if: steps.image_changed.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/deployment.yaml
        git commit -m "ci: update app image to ${{ github.sha }} [skip ci]"
        git push origin HEAD:${{ github.head_ref || github.ref_name }}