name: Deploy to Kubernetes
on:
  push:
    branches: [ "*" ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'kubernetes/**'
  pull_request:
    branches: [ "*" ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'kubernetes/**'
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io  # or your container registry (docker.io, azurecr.io, etc.)
  NAMESPACE: production
  CLUSTER_NAME: kubernetes-admin@kubernetes
  RESOURCE_GROUP: local  # For Azure/AWS/GCP

jobs:
  # Job 1: Build and test frontend
  build-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Run tests
      working-directory: ./frontend
      run: npm test -- --watchAll=false
    
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Job 2: Build and test backend
  build-backend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      working-directory: ./backend
      run: |
        pip install pytest pytest-cov
        pytest --cov=. --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Job 3: Deploy to Kubernetes
  deploy:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: Install Helm (optional)
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'
    
    - name: Update Kubernetes manifests with image tags
      run: |
        # Update frontend deployment image
        sed -i "s|image:.*frontend:.*|image: ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}|g" kubernetes/frontend-deployment.yaml
        # Update backend deployment image
        sed -i "s|image:.*backend:.*|image: ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}|g" kubernetes/backend-deployment.yaml
    
    - name: Create namespace if does not exists
      run: |
        kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Apply secrets (if using external secrets management)
      run: |
        # Create secrets from GitHub secrets
        kubectl create secret generic app-secrets \
          --namespace=${{ env.NAMESPACE }} \
          --from-literal=db-password=${{ secrets.DB_PASSWORD }} \
          --from-literal=jwt-secret=${{ secrets.JWT_SECRET }} \
          --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Apply Kubernetes manifests
      run: |
        # Apply configmaps
        kubectl apply -f kubernetes/configmap.yaml -n ${{ env.NAMESPACE }} || true
        
        # Apply database deployment and service
        kubectl apply -f kubernetes/database-deployment.yaml -n ${{ env.NAMESPACE }}
        
        # Apply backend deployment and service
        kubectl apply -f kubernetes/backend-deployment.yaml -n ${{ env.NAMESPACE }}
        kubectl apply -f kubernetes/backend-service.yaml -n ${{ env.NAMESPACE }}
        
        # Apply frontend deployment and service
        kubectl apply -f kubernetes/frontend-deployment.yaml -n ${{ env.NAMESPACE }}
        kubectl apply -f kubernetes/frontend-service.yaml -n ${{ env.NAMESPACE }}
        
        # Apply ingress (if using)
        kubectl apply -f kubernetes/ingress.yaml -n ${{ env.NAMESPACE }} || true
    
    - name: Wait for deployments to be ready
      run: |
        kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=5m
        kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=5m
        kubectl rollout status deployment/database -n ${{ env.NAMESPACE }} --timeout=5m
    
    - name: Verify deployment
      run: |
        kubectl get pods -n ${{ env.NAMESPACE }}
        kubectl get services -n ${{ env.NAMESPACE }}
        kubectl get ingress -n ${{ env.NAMESPACE }} || true

  # Job 4: Run integration tests after deployment
  integration-tests:
    needs: deploy
    runs-on: ubuntu-latest
    if: always() && needs.deploy.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: Run integration tests
      run: |
        # Get service endpoints
        FRONTEND_IP=$(kubectl get service frontend -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        BACKEND_IP=$(kubectl get service backend -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # Run tests (adjust based on your testing framework)
        echo "Running integration tests against $FRONTEND_IP and $BACKEND_IP"
        # Add your integration test commands here
        # For example: npm run test:integration
